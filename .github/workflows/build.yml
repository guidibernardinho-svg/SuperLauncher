name: Build and Release SuperLauncher

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Build Windows
        run: pyinstaller --onefile --windowed --name SuperLauncher main.py

      - name: Zip Windows
        run: powershell Compress-Archive -Path dist/SuperLauncher.exe -DestinationPath dist/SuperLauncher-Windows.zip

      - name: Release Windows
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SuperLauncher-Windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python3 -m pip install --upgrade pip
          pip3 install PySide6 pyinstaller

      - name: Build macOS
        run: pyinstaller --onefile --windowed --name SuperLauncher main.py

      - name: Zip macOS
        run: |
          cd dist
          zip -r SuperLauncher-macOS.zip SuperLauncher

      - name: Release macOS
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SuperLauncher-macOS.zip
