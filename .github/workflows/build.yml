name: Build and Release SuperLauncher

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name SuperLauncher main.py

      - name: Compactar Windows
        run: |
          powershell Compress-Archive -Path dist/SuperLauncher.exe -DestinationPath dist/SuperLauncher-Windows.zip

      - name: Criar Release Windows
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/SuperLauncher-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python3 -m pip install --upgrade pip
          pip3 install PySide6 pyinstaller

      - name: Build macOS APP
        run: |
          pyinstaller --onefile --windowed --name SuperLauncher main.py

      - name: Compactar macOS
        run: |
          cd dist
          zip -r SuperLauncher-macOS.zip SuperLauncher

      - name: Criar Release macOS
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/SuperLauncher-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
