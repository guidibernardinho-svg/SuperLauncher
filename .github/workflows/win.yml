name: Build Windows SuperLauncher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name SuperLauncher main.py

      - name: Compactar Windows
        run: |
          powershell Compress-Archive -Path dist/SuperLauncher.exe -DestinationPath dist/SuperLauncher-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperLauncher-Windows
          path: dist/SuperLauncher-Windows.zip

      - name: Criar Release (somente tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/SuperLauncher-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
