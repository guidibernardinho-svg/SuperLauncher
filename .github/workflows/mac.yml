# .github/workflows/mac.yml
name: Build macOS SuperLauncher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python3 -m pip install --upgrade pip
          pip3 install PySide6 pyinstaller

      - name: Build macOS APP
        run: |
          pyinstaller --windowed --name SuperLauncher main.py

      - name: Verificar build
        run: |
          ls -la dist

      - name: Compactar macOS APP
        run: |
          cd dist
          zip -r SuperLauncher-macOS.zip SuperLauncher.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperLauncher-macOS
          path: dist/SuperLauncher-macOS.zip

      - name: Criar Release (somente tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/SuperLauncher-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
